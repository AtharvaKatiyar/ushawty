version: "3.8"

services:
  backend:
    build: ./server
    container_name: ushawty-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - BASE_URL=http://localhost:5000
      - VERSION=${VERSION}
    restart: always

  frontend:
    build: ./client
    container_name: ushawty-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
      - VERSION=${VERSION}
    restart: always