name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

  build-images:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest ./server
        docker push ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest

    - name: Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest ./client
        docker push ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              echo "🚀 Starting deployment..."

              # Pull latest images
              docker pull ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest
              docker pull ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

              echo "🔍 Detecting currently running deployment..."

              # Detect active frontend-blue container port
              ACTIVE_FRONTEND_PORT=$(docker ps --format '{{.Names}} {{.Ports}}' | grep frontend-blue | grep -o '[0-9]*->80' | cut -d'-' -f1)

              # Default if nothing running yet
              if [ -z "$ACTIVE_FRONTEND_PORT" ]; then
                  ACTIVE_FRONTEND_PORT=3001
              fi

              echo "Active frontend port: $ACTIVE_FRONTEND_PORT"

              # Decide next deployment slot
              if [ "$ACTIVE_FRONTEND_PORT" = "3001" ]; then
                  OLD_FRONTEND_PORT=3001
                  OLD_BACKEND_PORT=5001

                  NEW_FRONTEND_PORT=3002
                  NEW_BACKEND_PORT=5002
              else
                  OLD_FRONTEND_PORT=3002
                  OLD_BACKEND_PORT=5002

                  NEW_FRONTEND_PORT=3001
                  NEW_BACKEND_PORT=5001
              fi

              echo "Old Ports → Frontend:$OLD_FRONTEND_PORT Backend:$OLD_BACKEND_PORT"
              echo "New Ports → Frontend:$NEW_FRONTEND_PORT Backend:$NEW_BACKEND_PORT"

              echo "📦 Deploying to new ports: $NEW_FRONTEND_PORT / $NEW_BACKEND_PORT"

              # Cleanup previous green leftovers
              docker stop frontend-green backend-green || true
              docker rm frontend-green backend-green || true

              # Run backend
              docker run -d \
                -p $NEW_BACKEND_PORT:5000 \
                -e BASE_URL=http://13.233.225.177 \
                -e SIMULATE_CRASH=true \
                --name backend-green \
                ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest

              # Run frontend
              docker run -d \
                -p $NEW_FRONTEND_PORT:80 \
                --name frontend-green \
                ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

              echo "⏳ Waiting for backend health..."

              for i in {1..10}; do
                  if curl -f http://localhost:$NEW_BACKEND_PORT/health; then
                      echo "✅ Backend healthy"
                      break
                  fi

                  echo "🔁 Retry $i..."
                  sleep 2
              done

              if ! curl -f http://localhost:$NEW_BACKEND_PORT/health; then
                  echo "❌ Backend failed"
                  docker stop backend-green frontend-green
                  docker rm backend-green frontend-green
                  exit 1
              fi

              echo "🌐 Waiting for frontend..."

              for i in {1..10}; do
                  FRONTEND_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_FRONTEND_PORT)

                  if [ "$FRONTEND_STATUS" = "200" ]; then
                      echo "✅ Frontend reachable"
                      break
                  fi

                  echo "🔁 Frontend retry $i..."
                  sleep 2
              done

              FRONTEND_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_FRONTEND_PORT)

              if [ "$FRONTEND_STATUS" != "200" ]; then
                  echo "❌ Frontend unreachable"
                  docker stop backend-green frontend-green
                  docker rm backend-green frontend-green
                  exit 1
              fi

              echo "🔁 Testing API..."

              RESPONSE=$(curl -s -X POST http://localhost:$NEW_BACKEND_PORT/shorten \
                  -H "Content-Type: application/json" \
                  -d '{"url":"https://example.com"}')

              if ! echo "$RESPONSE" | grep "shortUrl"; then
                  echo "❌ API failed"
                  docker stop backend-green frontend-green
                  docker rm backend-green frontend-green
                  exit 1
              fi

              echo "🔗 Testing redirect..."

              ID=$(echo "$RESPONSE" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')

              REDIRECT_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_BACKEND_PORT/$ID)

              if [ "$REDIRECT_STATUS" != "302" ]; then
                  echo "❌ Redirect failed"
                  docker stop backend-green frontend-green
                  docker rm backend-green frontend-green
                  exit 1
              fi

              echo "🔀 Switching NGINX..."

              sudo sed -i "s|proxy_pass http://127.0.0.1:$OLD_FRONTEND_PORT|proxy_pass http://127.0.0.1:$NEW_FRONTEND_PORT|g" /etc/nginx/nginx.conf
              sudo sed -i "s|proxy_pass http://127.0.0.1:$OLD_BACKEND_PORT|proxy_pass http://127.0.0.1:$NEW_BACKEND_PORT|g" /etc/nginx/nginx.conf

              sudo systemctl reload nginx

              echo "🩺 Validating LIVE production..."

              LIVE_FRONTEND=$(curl -o /dev/null -s -w "%{http_code}" http://localhost)
              LIVE_API=$(curl -o /dev/null -s -w "%{http_code}" http://localhost/api/health)

              if [ "$LIVE_FRONTEND" != "200" ] || [ "$LIVE_API" != "200" ]; then
                  echo "❌ Live validation failed → rollback"

                  sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_FRONTEND_PORT|proxy_pass http://127.0.0.1:$OLD_FRONTEND_PORT|g" /etc/nginx/nginx.conf
                  sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_BACKEND_PORT|proxy_pass http://127.0.0.1:$OLD_BACKEND_PORT|g" /etc/nginx/nginx.conf

                  sudo systemctl reload nginx

                  docker stop frontend-green backend-green
                  docker rm frontend-green backend-green

                  exit 1
              fi

              echo "⏳ Monitoring deployment for delayed crashes..."

              sleep 180

              LIVE_FRONTEND=$(curl -o /dev/null -s -w "%{http_code}" http://localhost)
              LIVE_API=$(curl -o /dev/null -s -w "%{http_code}" http://localhost/api/health)

              if [ "$LIVE_FRONTEND" != "200" ] || [ "$LIVE_API" != "200" ]; then
                  echo "❌ Delayed failure detected → rollback"

                  sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_FRONTEND_PORT|proxy_pass http://127.0.0.1:$OLD_FRONTEND_PORT|g" /etc/nginx/nginx.conf
                  sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_BACKEND_PORT|proxy_pass http://127.0.0.1:$OLD_BACKEND_PORT|g" /etc/nginx/nginx.conf

                  sudo systemctl reload nginx

                  docker stop frontend-green backend-green
                  docker rm frontend-green backend-green

                  exit 1
              fi
              echo "🔁 Finalizing deployment..."

              # Rename green to temporary names first
              docker rename frontend-green frontend-next
              docker rename backend-green backend-next

              # Ensure renamed containers are still running
              docker start frontend-next || true
              docker start backend-next || true

              echo "🩺 Verifying promoted containers..."

              docker ps | grep frontend-next
              docker ps | grep backend-next

              if ! docker ps | grep frontend-next || ! docker ps | grep backend-next; then
                echo "❌ Finalized containers not running"

                sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_FRONTEND_PORT|proxy_pass http://127.0.0.1:$OLD_FRONTEND_PORT|g" /etc/nginx/nginx.conf
                sudo sed -i "s|proxy_pass http://127.0.0.1:$NEW_BACKEND_PORT|proxy_pass http://127.0.0.1:$OLD_BACKEND_PORT|g" /etc/nginx/nginx.conf

                sudo systemctl reload nginx

                docker stop frontend-next backend-next || true
                docker rm frontend-next backend-next || true

                exit 1
              fi

              # Remove old blue only AFTER safe rename
              docker stop frontend-blue backend-blue || true
              docker rm frontend-blue backend-blue || true

              # Promote next → blue
              docker rename frontend-next frontend-blue
              docker rename backend-next backend-blue

              echo "🎉 Deployment successful with rollback protection"