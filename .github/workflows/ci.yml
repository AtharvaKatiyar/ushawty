name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

  build-images:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest ./server
        docker push ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest

    - name: Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest ./client
        docker push ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
                echo "🚀 Starting deployment..."

                # Pull latest images
                docker pull ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest
                docker pull ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

                echo "🔍 Detecting current active port..."

                CURRENT_FRONTEND_PORT=$(grep -o '127.0.0.1:[0-9]*' /etc/nginx/nginx.conf | head -1 | cut -d: -f2)

                if [ "$CURRENT_FRONTEND_PORT" = "3001" ]; then
                    NEW_FRONTEND_PORT=3002
                    NEW_BACKEND_PORT=5002
                    OLD_FRONTEND_PORT=3001
                    OLD_BACKEND_PORT=5001
                else
                    NEW_FRONTEND_PORT=3001
                    NEW_BACKEND_PORT=5001
                    OLD_FRONTEND_PORT=3002
                    OLD_BACKEND_PORT=5002
                fi

                echo "📦 Deploying to new ports: $NEW_FRONTEND_PORT / $NEW_BACKEND_PORT"

                # Clean leftover
                docker stop frontend-green backend-green || true
                docker rm frontend-green backend-green || true

                # Run new containers
                docker run -d -p $NEW_BACKEND_PORT:5000 --name backend-green ${{ secrets.DOCKER_USERNAME }}/ushawty-backend:latest
                docker run -d -p $NEW_FRONTEND_PORT:80 --name frontend-green ${{ secrets.DOCKER_USERNAME }}/ushawty-frontend:latest

                echo "⏳ Waiting for backend health..."

                # Backend health check loop
                for i in {1..10}; do
                    if curl -f http://localhost:$NEW_BACKEND_PORT/health; then
                    echo "✅ Backend healthy"
                    break
                    fi
                    echo "🔁 Retry $i..."
                    sleep 2
                done

                if ! curl -f http://localhost:$NEW_BACKEND_PORT/health; then
                    echo "❌ Backend failed"
                    docker stop backend-green frontend-green
                    docker rm backend-green frontend-green
                    exit 1
                fi

                echo "🌐 Checking frontend rendering..."

                echo "🌐 Waiting for frontend..."

                for i in {1..10}; do
                  FRONTEND_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_FRONTEND_PORT)

                  if [ "$FRONTEND_STATUS" = "200" ]; then
                    echo "✅ Frontend reachable"
                    break
                  fi

                  echo "🔁 Frontend retry $i..."
                  sleep 2
                done

                # final validation
                FRONTEND_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_FRONTEND_PORT)

                if [ "$FRONTEND_STATUS" != "200" ]; then
                  echo "❌ Frontend unreachable"
                  docker stop backend-green frontend-green
                  docker rm backend-green frontend-green
                  exit 1
                fi

                RESPONSE=$(curl -s -X POST http://localhost:$NEW_BACKEND_PORT/shorten \
                    -H "Content-Type: application/json" \
                    -d '{"url":"https://example.com"}')

                echo "Response: $RESPONSE"

                if echo "$RESPONSE" | grep "shortUrl"; then
                    echo "✅ API working"
                else
                    echo "❌ API failed"
                    docker stop backend-green frontend-green
                    docker rm backend-green frontend-green
                    exit 1
                fi

                echo "🔗 Testing redirect..."

                ID=$(echo "$RESPONSE" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')

                if [ -z "$ID" ]; then
                    echo "❌ Failed to extract ID"
                    docker stop backend-green frontend-green
                    docker rm backend-green frontend-green
                    exit 1
                fi

                REDIRECT_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:$NEW_BACKEND_PORT/$ID)

                if [ "$REDIRECT_STATUS" = "302" ]; then
                    echo "✅ Redirect working"
                else
                    echo "❌ Redirect failed"
                    docker stop backend-green frontend-green
                    docker rm backend-green frontend-green
                    exit 1
                fi

                echo "🔀 Switching NGINX..."

                sudo sed -i "s|proxy_pass http://127.0.0.1:$OLD_FRONTEND_PORT|proxy_pass http://127.0.0.1:$NEW_FRONTEND_PORT|g" /etc/nginx/nginx.conf
                sudo sed -i "s|proxy_pass http://127.0.0.1:$OLD_BACKEND_PORT|proxy_pass http://127.0.0.1:$NEW_BACKEND_PORT|g" /etc/nginx/nginx.conf

                sudo systemctl reload nginx

                echo "🧹 Cleaning old containers..."

                docker stop frontend-blue backend-blue || true
                docker rm frontend-blue backend-blue || true

                echo "🔁 Renaming green → blue"

                docker rename frontend-green frontend-blue
                docker rename backend-green backend-blue

                echo "🎉 Deployment successful with FULL validation!"